services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ragkb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ragkb}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  ai-service:
    build:
      context: ./python-ai
      dockerfile: Dockerfile
    container_name: rag_ai
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ragkb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      UPLOAD_DIR: /workspace/uploads
      GAME_DATA_DIR: ${GAME_DATA_DIR:-/workspace/game-data}
      REDIS_URL: redis://redis:6379/0
      QUERY_CACHE_TTL_SEC: 300
      QUERY_CACHE_PREFIX: rag:query:v1

      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai_compatible}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v2}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}

      LLM_PROVIDER: ${LLM_PROVIDER:-openai_compatible}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}

      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-dashscope}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-https://dashscope.aliyuncs.com/compatible-api/v1/reranks}
      RERANK_API_KEY: ${RERANK_API_KEY}
      RERANK_MODEL: ${RERANK_MODEL:-qwen3-rerank}
      RERANK_TOP_N: ${RERANK_TOP_N:-20}
      RERANK_TIMEOUT_SEC: ${RERANK_TIMEOUT_SEC:-30}
      RERANK_SCORE_WEIGHT: ${RERANK_SCORE_WEIGHT:-0.65}
      LOCAL_RERANK_SCORE_WEIGHT: ${LOCAL_RERANK_SCORE_WEIGHT:-0.35}
      RERANK_INSTRUCT: ${RERANK_INSTRUCT:-Given a web search query, retrieve relevant passages that answer the query.}

      PYTHONUNBUFFERED: "1"
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    volumes:
      - ./uploads:/workspace/uploads
      - ./python-ai/app:/app/app
      - ./game-data:/workspace/game-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: ./cpp-gateway
      dockerfile: Dockerfile
    container_name: rag_gateway
    restart: unless-stopped
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}

      AI_SERVICE_HOST: ai-service
      AI_SERVICE_PORT: 8000

      REDIS_HOST: redis
      REDIS_PORT: 6379

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ragkb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

      UPLOAD_DIR: /workspace/uploads
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./uploads:/workspace/uploads
      - ./cpp-gateway/src:/app/src
    depends_on:
      ai-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-game:
    build:
      context: ./web-game
      dockerfile: Dockerfile
    container_name: rag_web_game
    restart: unless-stopped
    environment:
      VITE_DEV_PROXY_TARGET: http://ai-service:8000
    ports:
      - "${WEB_GAME_PORT:-5173}:5173"
    volumes:
      - ./web-game:/workspace/web-game
      - web_game_node_modules:/workspace/web-game/node_modules
    depends_on:
      ai-service:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  web_game_node_modules:
